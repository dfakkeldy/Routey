name: CI

on:
  push:
    branches:
      - main
      - weekly
      - nightly
  pull_request:
    branches:
      - main
      - weekly
      - nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate-tests:
    name: Build gate + tests
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Cache SwiftPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
            RouteyKit/.build
          key: ${{ runner.os }}-xcode26.5-spm-deriveddata-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode26.5-spm-deriveddata-

      - name: Resolve packages
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project app/Routey/Routey.xcodeproj \
            -scheme Routey
          swift package --package-path RouteyKit resolve

      - name: Resolve simulator destination
        run: |
          set -euo pipefail

          ruby <<'RUBY' > "$RUNNER_TEMP/simulator.env"
          require "json"
          require "rubygems"

          devices = JSON.parse(`xcrun simctl list devices available -j`).fetch("devices")
          candidates = devices.flat_map do |runtime, runtime_devices|
            next [] unless runtime.include?("iOS")

            version_text = runtime[/iOS-(.+)$/, 1].to_s.tr("-", ".")
            version = Gem::Version.new(version_text.empty? ? "0" : version_text)
            runtime_devices
              .select { |device| device["isAvailable"] && device["name"].start_with?("iPhone") }
              .map { |device| [version, device] }
          end

          selected = candidates.sort_by(&:first).last
          if selected
            _version, device = selected
            puts "SIMULATOR_UDID=#{device.fetch("udid")}"
            puts "IOS_SIM_DESTINATION=platform=iOS Simulator,id=#{device.fetch("udid")}"
            puts "CAN_RUN_SIM_TESTS=true"
          else
            puts "IOS_SIM_DESTINATION=generic/platform=iOS Simulator"
            puts "CAN_RUN_SIM_TESTS=false"
          end
          RUBY

          cat "$RUNNER_TEMP/simulator.env" >> "$GITHUB_ENV"

      - name: Check simulator runtime health
        run: |
          set -euo pipefail

          if [[ "${CAN_RUN_SIM_TESTS}" != "true" ]]; then
            echo "::notice::No available iPhone simulator was found; build-for-testing remains the gate."
            exit 0
          fi

          set +e
          ruby <<'RUBY'
          require "timeout"

          udid = ENV.fetch("SIMULATOR_UDID")

          begin
            Timeout.timeout(120) do
              system("xcrun", "simctl", "boot", udid, out: File::NULL, err: File::NULL)
              exit(system("xcrun", "simctl", "bootstatus", udid, "-b") ? 0 : 1)
            end
          rescue Timeout::Error
            exit 124
          end
          RUBY
          boot_status="$?"
          set -e

          if [[ "${boot_status}" == "0" ]]; then
            exit 0
          fi

          echo "CAN_RUN_SIM_TESTS=false" >> "$GITHUB_ENV"
          echo "::notice::Simulator runtime failed health check with status ${boot_status}; build-for-testing remains the gate."

      - name: Build iOS app for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project app/Routey/Routey.xcodeproj \
            -scheme Routey \
            -configuration Debug \
            -destination "${IOS_SIM_DESTINATION}" \
            -derivedDataPath DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build macOS proof app
        run: |
          set -euo pipefail
          xcodebuild build \
            -project app/Routey/Routey.xcodeproj \
            -scheme RouteyMacProof \
            -configuration Debug \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Run RouteyKit tests
        run: |
          set -euo pipefail
          swift test --package-path RouteyKit --parallel

      - name: Run app tests without rebuilding
        run: |
          set -euo pipefail

          if [[ "${CAN_RUN_SIM_TESTS}" != "true" ]]; then
            echo "::notice::Skipping test-without-building because no healthy iOS Simulator runtime was available; build-for-testing remains the gate."
            exit 0
          fi

          test_log="${RUNNER_TEMP}/test-without-building.log"
          set +e
          xcodebuild test-without-building \
            -project app/Routey/Routey.xcodeproj \
            -scheme Routey \
            -configuration Debug \
            -destination "${IOS_SIM_DESTINATION}" \
            -derivedDataPath DerivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation 2>&1 | tee "${test_log}"
          test_status="${PIPESTATUS[0]}"
          set -e

          if [[ "${test_status}" == "0" ]]; then
            exit 0
          fi

          if grep -Eiq "Invalid device state|server died|Failed to launch app|Unable to boot|timed out|CoreSimulator" "${test_log}"; then
            echo "::notice::Skipping test-without-building because the simulator runtime failed after build-for-testing passed; build-for-testing remains the gate."
            exit 0
          fi

          exit "${test_status}"
